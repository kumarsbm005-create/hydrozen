<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HYDROZEN is a premium AI prompt-sharing platform for creators, artists, and prompt engineers.">
  <title>HYDROZEN - AI Prompt Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=hydrozen-3">
</head>
<body>
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="page-loader" id="pageLoader" aria-hidden="true">
    <div class="loader-orbit">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p>Initializing HYDROZEN</p>
  </div>

  <div class="ambient-scene" aria-hidden="true">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
    <div class="glow glow-three"></div>
    <canvas id="particleCanvas"></canvas>
  </div>

  <header class="navbar" id="navbar">
    <a class="brand" href="#home" aria-label="HYDROZEN home">
      <span class="brand-glyph">H</span>
      <span>HYDROZEN</span>
    </a>

    <nav class="nav-menu" aria-label="Main navigation">
      <a href="#explore">Explore</a>
      <a href="#upload">Upload Prompt</a>
    </nav>

    <div class="auth-cluster">
      <button class="auth-button" id="googleLogin" type="button">Google Login</button>
      <button class="auth-button ghost" id="logoutButton" type="button" hidden>Logout</button>
      <span class="user-pill" id="userPill" hidden></span>
    </div>

    <button class="nav-toggle" id="navToggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-shell">
        <p class="eyebrow reveal">AI Prompt Exchange / Creator Operating System</p>
        <h1 class="reveal">HYDROZEN Prompt Universe</h1>
        <p class="hero-copy reveal">Search cinematic prompts, creator systems, Flux workflows, Grok ideas, and reusable AI intelligence.</p>

        <form class="hero-search reveal" role="search" id="heroSearchForm">
          <span aria-hidden="true">Search</span>
          <label class="sr-only" for="searchInput">Search prompts</label>
          <input id="searchInput" type="search" placeholder="Search Midjourney, Flux, cinematic lighting, product shots...">
          <button type="submit">Explore</button>
        </form>

        <div class="hero-metrics reveal" aria-label="Platform metrics">
          <article>
            <strong id="totalPrompts">0</strong>
            <span>Prompts</span>
          </article>
          <article>
            <strong>5</strong>
            <span>Engines</span>
          </article>
          <article>
            <strong id="savedCount">0</strong>
            <span>Saved</span>
          </article>
        </div>
      </div>
    </section>

    <section class="filters-section" id="explore" aria-label="Prompt filters">
      <div class="section-heading reveal">
        <p class="eyebrow">Explore Library</p>
      </div>

      <div class="filter-rail reveal" role="tablist" aria-label="Prompt categories">
        <button class="filter-pill active" type="button" data-category="All">All</button>
        <button class="filter-pill" type="button" data-category="ChatGPT">ChatGPT</button>
        <button class="filter-pill" type="button" data-category="Midjourney">Midjourney</button>
        <button class="filter-pill" type="button" data-category="Stable Diffusion">Stable Diffusion</button>
        <button class="filter-pill" type="button" data-category="Grok">Grok</button>
        <button class="filter-pill" type="button" data-category="Flux">Flux</button>
      </div>

      <div class="library-frame reveal">
        <div class="library-topline">
